<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JazzCash Slip</title>
  <style>
    body {
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column; /* so buttons sit below slip */
      height: 100vh;
      margin: 0;
    }
    .slip {
      position: relative;
      width: 360px;              /* normalized width */
      margin-bottom: 10px;       /* space before buttons */
      padding-bottom: 20px;      /* breathing space at bottom */
    }
    .slip img {
      width: 100%;
      height: auto;              /* keep aspect ratio */
      display: block;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      font-family: Arial, sans-serif;
      color: black;
    }
    .overlay h3 {
      text-align: center;
      margin-top: 31px;
      margin-bottom: 8px;
      font-weight: 900;
      font-size: 21px;
    }
    .overlay .tid {
      text-align: center;
      font-weight: 700;
      color: rgb(65,65,65);
      margin: 0;
      padding: 0;
      font-size: 13px;
    }
    .overlay .datetime {
      text-align: center;
      font-weight: 500;
      font-size: 13px;
      color: rgb(108,108,108);
      display: block;
      margin-top: 4px;
    }
    .overlay .amount {
      text-align: center;
      margin-top: 39px;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .overlay .amount .major {
      font-size: 28px;
      font-weight: 900;
    }
    .overlay .amount .minor {
      font-size: 17px;
      font-weight: 900;
    }
    .overlay .transfer {
      text-align: center;
      color: rgb(108,108,108);
      margin-top: 2px;
      margin-bottom: 20px;
    }
    .overlay .fee,
    .overlay .to,
    .overlay .from {
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      font-size: 18px;
    }
    .overlay .fee { margin-top: 30px; }
    .overlay .to { margin-top: 37px; }
    .overlay .from { margin-top: 30px; }

    /* Save & Share buttons */
    .actions {
      text-align: center;
    }
    .actions button {
      padding: 10px 20px;
      margin: 0 5px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(90deg,#00c6ff,#0072ff);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="slip" id="slipArea">
    <img src="https://amankhan85.github.io/App/bg.png" alt="Slip Background">

    <div class="overlay">
      <h3>Transaction Successful</h3>
      <p class="tid" id="tid"></p>
      <span class="datetime" id="datetime"></span>

      <p class="amount">
        <span class="major" id="amountMajor"></span><span class="minor">.00</span>
      </p>
      <p style="font-size:16px; font-weight:600;" class="transfer">Transferred to JazzCash</p>

      <div class="fee">
        <span style="color:rgb(108,108,108);">Fee</span>
        <span style="color:rgb(50,50,50);" id="fee"></span>
      </div>

      <div class="to">
        <span style="color:rgb(108,108,108);">To</span>
        <span style="color:rgb(50,50,50); text-align:right;" id="to"></span>
      </div>

      <div class="from">
        <span style="color:rgb(108,108,108);">From</span>
        <span style="color:rgb(50,50,50); text-align:right;" id="from"></span>
      </div>
    </div>
  </div>

  <!-- Save & Share buttons -->
  <div class="actions">
    <button onclick="saveSlip()">Save</button>
    <button onclick="shareSlip()">Share</button>
  </div>

  <!-- html2canvas for capture -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    // Generate a random 12-digit TID
    function generateTID() {
      let tid = '';
      for (let i = 0; i < 12; i++) {
        tid += Math.floor(Math.random() * 10);
      }
      return tid;
    }

    // Format current date and time once
    function formatDateTime() {
      const now = new Date();
      const optionsDate = { year: 'numeric', month: 'long', day: 'numeric' };
      const optionsTime = { hour: '2-digit', minute: '2-digit' };
      const date = now.toLocaleDateString('en-US', optionsDate);
      const time = now.toLocaleTimeString('en-US', optionsTime);
      return `On ${date} at ${time}`;
    }

    // Insert values into slip (runs once at load)
    document.getElementById("tid").textContent = "TID: " + generateTID();
    document.getElementById("datetime").textContent = formatDateTime();

    // Get values from URL
    const params = new URLSearchParams(window.location.search);
    document.getElementById("amountMajor").textContent = "Rs. " + (params.get("amount") || "0");
    document.getElementById("fee").textContent = "Rs. " + (params.get("fee") || "0");

    const receiverName = params.get("receiverName") || "";
    const receiverNumber = params.get("receiverNumber") || "";
    document.getElementById("to").innerHTML = receiverName + "<br>" + receiverNumber;

    const fromName = params.get("fromName") || "";
    const fromNumber = params.get("fromNumber") || "";
    document.getElementById("from").innerHTML = fromName + "<br>" + fromNumber;

    // Save slip as image
    function saveSlip() {
      const slip = document.getElementById('slipArea');
      html2canvas(slip).then(canvas => {
        const link = document.createElement('a');
        link.download = 'JazzSlip.png';
        link.href = canvas.toDataURL();
        link.click();
      });
    }

    // Share slip image
    function shareSlip() {
      const slip = document.getElementById('slipArea');
      html2canvas(slip).then(canvas => {
        canvas.toBlob(blob => {
          const file = new File([blob], "JazzSlip.png", { type: "image/png" });
          if (navigator.share) {
            navigator.share({
              files: [file],
              title: "JazzCash Slip",
              text: "Here is your transaction slip"
            });
          } else {
            alert("Sharing not supported on this device.");
          }
        });
      });
    }

    // Back navigation handling
    window.onload = function() {
      history.pushState({ page: "slip" }, "Slip", window.location.href);
    };
    window.onpopstate = function(event) {
      if (event.state && event.state.page === "slip") {
        window.location.href = "jf.html"; // go back to form
      }
    };
  </script>
</body>
</html>
