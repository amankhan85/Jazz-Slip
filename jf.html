<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaction Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0a0f2c, #000000);
      font-family: 'Poppins', sans-serif;
    }
    .form-container {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 12px;
      width: 360px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6), 0 0 15px rgba(0,198,255,0.25);
      backdrop-filter: blur(10px);
    }
    h2 {
      text-align: center;
      color: #ffffff;
      margin-bottom: 20px;
      font-weight: 600;
    }
    .form-group {
      position: relative;
      margin-bottom: 24px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 0;
      border: none;
      border-bottom: 2px solid #444;
      background: transparent;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s ease;
    }
    .form-group label {
      position: absolute;
      left: 0;
      top: 10px;
      color: #aaa;
      font-size: 14px;
      pointer-events: none;
      transition: all 0.25s ease-in-out;
    }
    .form-group input:focus {
      border-bottom: 2px solid #00c6ff;
    }
    .form-group input:focus + label,
    .form-group input:not(:placeholder-shown) + label {
      top: -8px;
      font-size: 12px;
      color: #00c6ff;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0, 198, 255, 0.4);
    }
    /* Branding footer */
    .branding {
      margin-top: 25px;
      text-align: center;
      font-size: 13px;
      padding-top: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
    }
    .branding img {
      width: 50px;
      height: 50px;
      margin-bottom: 8px;
      border-radius: 50%;
    }
    .branding p {
      margin: 0;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Fill Transaction Details</h2>
    <form action="js.html" method="GET">
      <div class="form-group">
        <input type="text" name="amount" placeholder=" " required>
        <label>Amount</label>
      </div>
      <div class="form-group">
        <input type="text" name="fee" placeholder=" " required>
        <label>Fee</label>
      </div>
      <div class="form-group">
        <input type="text" name="receiverName" placeholder=" " required>
        <label>Receiver Name</label>
      </div>
      <div class="form-group">
        <input type="text" name="receiverNumber" placeholder=" " required>
        <label>Receiver Number</label>
      </div>
      <div class="form-group">
        <input type="text" name="fromName" placeholder=" " required>
        <label>Sender Name</label>
      </div>
      <div class="form-group">
        <input type="text" name="fromNumber" placeholder=" " required>
        <label>Sender Number</label>
      </div>
      <button class="btn" type="submit">Get Slip</button>
    </form>

    <!-- Branding footer -->
    <div class="branding">
      <img src="https://amankhan85.github.io/App/zakuta.png" alt="Logo">
      <p>Designed by <strong>MR ZAKUTA</strong></p>
    </div>
  </div>
</body>
</html>
